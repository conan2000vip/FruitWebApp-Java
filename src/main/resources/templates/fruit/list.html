<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>商品管理</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
  <header>
    <h1>フルーツ販売ショップ</h1>
    <nav class="nav-box">
		<a href="/" class="nav-item" th:classappend="${page}=='home' ? ' active'">
			<span class="icon">🏠</span> HOME
		</a>
		<a href="/fruits" class="nav-item" th:classappend="${page}=='fruits' ? ' active'">
			商品管理
		</a>
		<a href="/admin" class="nav-item" th:classappend="${page}=='admin' ? ' active'">
			<span class="icon">👤</span> Admin
		</a>
    </nav>
  </header>

  <!-- Toolbar + Add Button-->
  <section class="toolbar">
    <form action="/fruits" method="get">
      <input type="text" name="keyword" id="keywordFilter" placeholder="🔍 商品を探す" th:value="${keyword}" />
      <button type="submit">検索</button>
      <select name="region" id="regionFilter" onchange="this.form.submit()">
        <option value="" th:selected="${selectedRegion == null || selectedRegion == ''}">全部</option>
        <option value="南部" th:selected="${selectedRegion == '南部'}">南部</option>
        <option value="北部" th:selected="${selectedRegion == '北部'}">北部</option>
        <option value="中部" th:selected="${selectedRegion == '中部'}">中部</option>
      </select>
    </form>

    <button type="button" class="add-btn" onclick="openAddForm()">
      商品追加
    </button>
   </section>

  <!-- Product List -->
  <main>
    <h2 class="section-title">商品一覧</h2>
    <div class="product-grid">
      <div class="product-card" th:each="fruit : ${fruits}">
        <img th:src="@{${fruit.imageUrl}}" class="product-img" />

        <h3 th:text="${fruit.name}"></h3>
        <p>価格: <span th:text="${fruit.price}"></span> 円</p>
        <p>地域: <span th:text="${fruit.region}"></span></p>
        <p th:text="${fruit.description}"></p>
        <p>在庫量: <span th:text="${fruit.quantity > 0 ? fruit.quantity : 0}"></span></p>

        <div class="actions">
          <!-- Delete -->
          <button type="button" class="btn btn-danger delete-btn" th:data-id="${fruit.id}">
            削除
          </button>

          <!-- Edit -->
          <button type="button" class="btn btn-primary" th:data-id="${fruit.id}" th:data-name="${fruit.name}"
            th:data-region="${fruit.region}" th:data-price="${fruit.price}" th:data-quantity="${fruit.quantity}"
            th:data-description="${fruit.description}" th:data-image-url="${fruit.imageUrl}"
            onclick="openUpdateForm(this)">
            編集
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Popup -->
  <div id="confirmDialog" class="confirm-overlay">
    <div class="confirm-box">
      <button class="close-btn" onclick="closeConfirmDialog()">×</button>
      <div class="icon-circle">!</div>
      <h3>商品を削除しますか？</h3>
      <p>この操作は元に戻せません。</p>
      <div class="confirm-actions">
        <button id="confirmYes" class="btn-ok">OK</button>
        <button id="confirmNo" class="btn-cancel">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 商品登録・編集モーダル -->
  <div id="fruitFormModal" class="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" onclick="closeFruitForm()">×</button>
      <h3 id="modalTitle">商品登録</h3>
      <form id="fruitForm" action="/fruits/save" class="modal-form" enctype="multipart/form-data">
        <input type="hidden" id="fruitId" name="id" />
        <input type="hidden" id="currentImageUrl" name="currentImageUrl" />

        <label>果物名＊
          <span id="fruitNameError" class="error-message"></span>
        </label>
        <input type="text" id="fruitName" placeholder="果物名を入力" />

        <label>地域＊
          <span id="fruitRegionError" class="error-message"></span>
        </label>
        <div class="region-options">
          <label><input type="radio" name="region" value="北部" /> 北部</label>
          <label><input type="radio" name="region" value="南部" /> 南部</label>
          <label><input type="radio" name="region" value="中部" /> 中部</label>
        </div>

        <label>販売価格＊
          <span id="fruitPriceError" class="error-message"></span>
        </label>
        <input type="number" id="fruitPrice" placeholder="価格を入力" />

        <label>在庫量＊
          <span id="fruitQuantityError" class="error-message"></span>
        </label>
        <input type="number" id="fruitQuantity" placeholder="数量を入力" />

        <label>商品画像＊
          <span id="fruitImageError" class="error-message"></span>
        </label>
		<div class="image-upload-area">
		    <button class="image_button" type="button">
		        <div class="image_area">
		            <span class="add_icon">🖼️画像を追加する</span>
		        </div>
		    </button>
		    <input type="file" id="fruitImage" class="real_upload">
		</div>

        <img id="previewImg" style="max-width: 100%; margin-top: 10px; display: none" />

        <label>説明</label>
        <textarea id="fruitDescription" rows="3" placeholder="果物の説明を入力"></textarea>
        <!-- <span id="fruitDescriptionError" class="error-message"></span> -->

        <div class="modal-actions">
          <button type="button" class="btn-save" onclick="saveFruit()">
            保存
          </button>
          <button type="button" class="btn-cancel" onclick="closeFruitForm()">
            キャンセル
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script th:src="@{/js/main.js}"></script>
</body>

</html>
